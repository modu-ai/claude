<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table — Claude Warm Editorial</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://statics.goorm.io" crossorigin="anonymous">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="https://statics.goorm.io/fonts/GoormSansCode/v1.0.1/GoormSansCode.min.css">
<script>
tailwind.config = { theme: { extend: {
  colors: { primary:'#cc785c','primary-active':'#a9583e','primary-disabled':'#e6dfd8', ink:'#141413', body:'#3d3d3a','body-strong':'#252523', muted:'#6c6a64','muted-soft':'#8e8b82', hairline:'#e6dfd8','hairline-soft':'#ebe6df', canvas:'#faf9f5','surface-soft':'#f5f0e8','surface-card':'#efe9de','surface-dark':'#181715','surface-dark-elevated':'#252320','on-primary':'#ffffff','on-dark':'#faf9f5','on-dark-soft':'#a09d96','accent-teal':'#5db8a6','accent-amber':'#e8a55a', success:'#5db872', warning:'#d4a017', error:'#c64545' },
  fontFamily: { display:['"Pretendard Variable"','Pretendard','sans-serif'], sans:['"Pretendard Variable"','Pretendard','sans-serif'], mono:['"Goorm Sans Code"','monospace'] },
  borderRadius: { sm:'6px', md:'8px', lg:'12px', xl:'16px', pill:'9999px' },
  spacing: { section:'96px' }
}}}
</script>
</head>
<body class="bg-canvas text-ink font-sans">
<main class="mx-auto max-w-4xl px-6 py-16">
  <header class="mb-12">
    <div class="text-xs font-semibold uppercase tracking-[0.18em] text-primary">Components</div>
    <h1 class="mt-2 font-display text-5xl font-medium tracking-tight text-ink">Table</h1>
    <p class="mt-3 max-w-2xl text-body">헤어라인 구분선, mono 대문자 헤더, 크림 surface 헤더. 숫자 열은 mono + 우측 정렬로 가독성 확보.</p>
  </header>

  <div class="w-full overflow-x-auto rounded-lg border border-hairline">
    <table class="w-full text-sm">
      <thead class="bg-surface-card text-left">
        <tr class="text-muted">
          <th class="px-4 py-3 text-xs font-semibold uppercase tracking-[0.12em]">지표</th>
          <th class="px-4 py-3 text-xs font-semibold uppercase tracking-[0.12em]">상태</th>
          <th class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-[0.12em]">값</th>
          <th class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-[0.12em]">변화</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-hairline [&_tr:nth-child(even)]:bg-surface-soft/40">
        <tr class="text-ink">
          <td class="px-4 py-3">API 응답시간</td>
          <td class="px-4 py-3"><span class="inline-flex items-center rounded-pill bg-success/15 px-3 py-1 text-xs font-medium text-success">정상</span></td>
          <td class="px-4 py-3 text-right font-mono">142ms</td>
          <td class="px-4 py-3 text-right font-mono text-success">−8%</td>
        </tr>
        <tr class="text-ink">
          <td class="px-4 py-3">에러율</td>
          <td class="px-4 py-3"><span class="inline-flex items-center rounded-pill bg-warning/15 px-3 py-1 text-xs font-medium text-warning">주의</span></td>
          <td class="px-4 py-3 text-right font-mono">0.4%</td>
          <td class="px-4 py-3 text-right font-mono text-warning">+0.1%</td>
        </tr>
        <tr class="text-ink">
          <td class="px-4 py-3">처리량</td>
          <td class="px-4 py-3"><span class="inline-flex items-center rounded-pill bg-success/15 px-3 py-1 text-xs font-medium text-success">정상</span></td>
          <td class="px-4 py-3 text-right font-mono">3.2k/s</td>
          <td class="px-4 py-3 text-right font-mono text-success">+12%</td>
        </tr>
        <tr class="text-ink">
          <td class="px-4 py-3">결제 게이트웨이</td>
          <td class="px-4 py-3"><span class="inline-flex items-center rounded-pill bg-error/15 px-3 py-1 text-xs font-medium text-error">장애</span></td>
          <td class="px-4 py-3 text-right font-mono">502</td>
          <td class="px-4 py-3 text-right font-mono text-error">—</td>
        </tr>
      </tbody>
    </table>
  </div>
  <p class="mt-4 font-mono text-xs text-muted">divide-hairline 구분선 · bg-surface-card 헤더 · font-mono 숫자 · nth-child(even) 스트라이프</p>
</main>
</body>
</html>
