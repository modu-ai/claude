<style>
  :root{
    --ivory:#FAF9F5; --paper:#FFFFFF; --slate:#141413; --clay:#D97757;
    --oat:#E3DACC; --g300:#D1CFC5; --g500:#87867F;
    --sans:"Noto Sans KR",system-ui,-apple-system,sans-serif;
    --serif:"Noto Serif KR",ui-serif,Georgia,serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ivory);color:var(--slate);font-family:var(--sans);line-height:1.6;}
  .wrap{max-width:980px;margin:0 auto;padding:32px 20px;}
  h1{font-family:var(--serif);font-weight:700;font-size:1.6rem;margin:0 0 .25rem;}
  .caption{color:var(--g500);font-size:.9rem;margin:.25rem 0 1.25rem;}
  .legend{display:flex;flex-wrap:wrap;gap:14px;font-size:.82rem;color:var(--slate);margin:0 0 16px;}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .sw{width:14px;height:14px;border-radius:3px;border:1px solid var(--g300);display:inline-block;}
  .view{background:var(--paper);border:1px solid var(--g300);border-radius:12px;padding:6px;min-height:560px;}
  details{margin-top:16px;}
  summary{cursor:pointer;color:var(--g500);font-size:.9rem;}
  pre{background:var(--paper);border:1px solid var(--g300);border-radius:8px;padding:12px;overflow:auto;font-size:.76rem;line-height:1.45;white-space:pre;}
  .src{color:var(--g500);font-size:.8rem;border-top:1px solid var(--g300);margin-top:24px;padding-top:12px;}
  .src a{color:var(--clay);}
</style>

<!-- draw.io 정적 뷰어 (무버전 롤링 CDN) -->
<script type="text/javascript" src="https://viewer.diagrams.net/js/viewer-static.min.js"></script>
<script>
(function(){
  var srcEl = document.getElementById('drawio-src');
  var xml = srcEl ? srcEl.textContent.trim() : '';
  // 폴백 덤프(textContent 대입 → 자동 이스케이프, 인젝션 안전)
  var dump = document.getElementById('src-dump');
  if (dump) dump.textContent = xml;
  // data-mxgraph 런타임 구성: JSON.stringify가 모든 따옴표/특수문자를 안전 처리
  var view = document.getElementById('drawio-view');
  var cfg = { highlight:"#D97757", nav:true, resize:true, "toolbar":"zoom layers lightbox", "toolbar-position":"top", lightbox:false, xml: xml };
  view.setAttribute('data-mxgraph', JSON.stringify(cfg));
  view.className = 'mxgraph view';   // mxgraph 클래스를 이 시점에 부여
  function render(){
    if (window.GraphViewer && typeof GraphViewer.processElements === 'function') {
      GraphViewer.processElements();
    }
  }
  if (document.readyState !== 'loading') render();
  else document.addEventListener('DOMContentLoaded', render);
})();
</script>
