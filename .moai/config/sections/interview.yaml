interview:
  enabled: true
  clarity_threshold: 4
  plan:
    max_rounds: 5
    questions_per_round: 3
  project:
    max_rounds: 3
    # Stage-A-scoped: `project.max_rounds` caps ONLY the Stage A clarity-scored
    # discovery rounds — it does NOT cap the project interview as a whole.
    # The mandatory extended-axes round (Stage B / Round 4, whose axes are declared
    # in `additional_axes` below) is EXEMPT from this cap: it always runs after
    # Stage A terminates, on every Stage A exit route (early exit, abandon, or cap).
    # So the project interview is variable-length Stage A + exactly one Stage B round.
    questions_per_round: 3
    # Extended interview axes for the project flow (Phase 0.3 / Phase 1.5).
    # Collected in the mandatory Stage B round (Round 4), NOT in the Stage A
    # clarity loop — they are clarity-independent factual collection.
    # Recorded into .moai/project/harness-spec.yaml by doc-generation.md and
    # consumed by harness generation (meta-harness.md, harness-build-entry.md).
    additional_axes:
      - name: verification
        description: "Test / e2e command or verification method"
      - name: ui_surface
        description: "UI surface (has-ui | headless)"
        values: [has-ui, headless]
      - name: external_systems
        description: "Databases / APIs / services the project integrates with"
      - name: team_sharing
        description: "Team-sharing intent (solo | team-shared)"
        values: [solo, team-shared]
  skip_conditions:
    - resume_spec_id_present
    - skip_interview_flag
    - technical_keywords_gte_5
