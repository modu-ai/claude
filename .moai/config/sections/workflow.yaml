workflow:
    # Optional default mode for /moai run and /moai design.
    # Values: autopilot | loop | team. Empty/absent = harness-based auto-selection.
    # Precedence: CLI --mode flag > this field > harness auto.
    # @MX:WARN - Default mode field is utility-skill-only consumer. @MX:REASON - Field is read by run skill dispatcher; changing semantics without updating dispatcher breaks behavior contract.
    default_mode: ""
    # agentic_loop: pipeline-level completion-loop iteration ceiling, loaded by
    # internal/config AgenticLoopConfig (types.go) with default from
    # DefaultAgenticLoopMaxIterations (defaults.go); also prose-read by the
    # orchestrator for the moai.md Agentic Completion Loop termination clause.
    # DISTINCT from loop_prevention.max_iterations (per-operation diagnostic
    # fix-loop bound) — separate blocks, separate semantics.
    agentic_loop:
        max_iterations: 10
    auto_clear:
        after_plan: true
        after_run: false
        enabled: true
        token_threshold: 150000
    execution_mode: auto
    # Iteration-ceiling precedence: CLI --max flag > ralph.yaml loop.max_iterations
    # > workflow.yaml loop_prevention.max_iterations (this block — the lowest-
    # precedence documented ceiling surface for the diagnostic fix-loop). The
    # memory-safe 50-iteration checkpoint (loop workflow Step 2) is an orthogonal
    # memory-pressure safeguard, not a fourth ceiling.
    loop_prevention:
        failure_pattern_detection: true
        max_iterations: 100
        max_retries_per_operation: 3
    # Worktree automation settings (per the canonical worktree contract)
    # auto_create: false (aligned with worktree-autonomous user policy).
    # L1 worktree is Claude Code runtime autonomous — MoAI orchestrator does not auto-create it.
    # auto_merge/auto_cleanup only take effect when the user manually creates a worktree.
    worktree:
        auto_create: false
        auto_merge: true
        auto_cleanup: true
        tmux_preferred: true
        session_name_pattern: "moai-{ProjectName}-{SPEC-ID}"
        # Sparse checkout paths for large monorepos (Claude Code v2.1.76+)
        # Uncomment and customize to speed up worktree creation
        # sparse_paths:
        #     - "src/"
        #     - "tests/"
        #     - "config/"
    token_budget:
        plan: 30000
        run: 180000
        sync: 40000
    # workflow_agents: dynamic-workflow purpose taxonomy -> {model, effort}
    # DEFAULTS. This block is the SSOT for workflow agent() model/effort
    # defaults; per-script literals in .claude/workflows/*.js override it.
    # Values are validated against the closed sets: model in
    # {inherit, sonnet, opus}, effort in {low, medium, high, xhigh, max}.
    workflow_agents:
        read-only-extract: { model: sonnet, effort: low }
        mechanical-transform: { model: sonnet, effort: medium }
        synthesize: { model: sonnet, effort: high }
        research: { model: sonnet, effort: high }
        verify-judge: { model: sonnet, effort: xhigh }
        implement: { model: sonnet, effort: xhigh }
        design-architecture: { model: opus, effort: xhigh }
    # model_routing: LEGACY flat block (Tier x Phase -> {model, effort}).
    # DEPRECATED — retained as a `medium` profile alias for one backward-compat
    # cycle (plan.md §D D6, SPEC-AGENT-ARCH-V2-001 M3b). Values mirror the
    # `medium` profile below. New code reads `model_routing_profiles` via
    # RouteModelFor(specTier, phase, perfTier); this flat key is NOT read by
    # the 3-arg accessor. Existing external readers continue to work.
    # Key format: <TIER>-<phase> where Tier in {S, M, L} and Phase in
    # {plan, run, sync, mx}. Closed sets: model in
    # {inherit, sonnet, opus, glm, fable}, effort in {low, medium, high, xhigh, max}.
    model_routing:
        S-plan: { model: sonnet, effort: medium }
        S-run: { model: sonnet, effort: high }
        S-sync: { model: sonnet, effort: low }
        S-mx: { model: sonnet, effort: low }
        M-plan: { model: sonnet, effort: medium }
        M-run: { model: sonnet, effort: xhigh }
        M-sync: { model: sonnet, effort: medium }
        M-mx: { model: sonnet, effort: low }
        L-plan: { model: opus, effort: high }
        L-run: { model: sonnet, effort: xhigh }
        L-sync: { model: sonnet, effort: high }
        L-mx: { model: sonnet, effort: medium }
    # model_routing_profiles: No-Haiku 3-tier policy (SPEC-AGENT-ARCH-V2-001
    # M3, design.md §D.5) — perfTier -> (Tier x Phase) -> {model, effort}.
    # 3 perfTiers (max/medium/low) × 12 cells (S/M/L × plan/run/sync/mx) = 36
    # entries. The orchestrator consults RouteModelFor(specTier, phase,
    # perfTier) at spawn time. `medium` is the default performance tier
    # (populated by `moai init --model-policy`). Closed sets: model in
    # {inherit, sonnet, opus, glm, fable}, effort in {low, medium, high, xhigh, max}.
    model_routing_profiles:
        max:
            S-plan: { model: opus, effort: high }
            S-run: { model: sonnet, effort: xhigh }
            S-sync: { model: sonnet, effort: medium }
            S-mx: { model: sonnet, effort: low }
            M-plan: { model: opus, effort: xhigh }
            M-run: { model: sonnet, effort: xhigh }
            M-sync: { model: sonnet, effort: medium }
            M-mx: { model: sonnet, effort: low }
            L-plan: { model: opus, effort: xhigh }
            L-run: { model: sonnet, effort: xhigh }
            L-sync: { model: sonnet, effort: high }
            L-mx: { model: sonnet, effort: medium }
        medium:
            S-plan: { model: sonnet, effort: medium }
            S-run: { model: sonnet, effort: high }
            S-sync: { model: sonnet, effort: low }
            S-mx: { model: sonnet, effort: low }
            M-plan: { model: sonnet, effort: medium }
            M-run: { model: sonnet, effort: xhigh }
            M-sync: { model: sonnet, effort: medium }
            M-mx: { model: sonnet, effort: low }
            L-plan: { model: opus, effort: high }
            L-run: { model: sonnet, effort: xhigh }
            L-sync: { model: sonnet, effort: high }
            L-mx: { model: sonnet, effort: medium }
        low:
            S-plan: { model: sonnet, effort: medium }
            S-run: { model: sonnet, effort: high }
            S-sync: { model: sonnet, effort: low }
            S-mx: { model: sonnet, effort: low }
            M-plan: { model: sonnet, effort: medium }
            M-run: { model: sonnet, effort: high }
            M-sync: { model: sonnet, effort: low }
            M-mx: { model: sonnet, effort: low }
            L-plan: { model: sonnet, effort: xhigh }
            L-run: { model: sonnet, effort: xhigh }
            L-sync: { model: sonnet, effort: medium }
            L-mx: { model: sonnet, effort: low }
