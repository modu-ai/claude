interview:
    clarity_threshold: 4
    enabled: true
    plan:
        max_rounds: 5
        questions_per_round: 3
    project:
        additional_axes:
            - description: Test / e2e command or verification method
              name: verification
            - description: UI surface (has-ui | headless)
              name: ui_surface
              values:
                - has-ui
                - headless
            - description: Databases / APIs / services the project integrates with
              name: external_systems
            - description: Team-sharing intent (solo | team-shared)
              name: team_sharing
              values:
                - solo
                - team-shared
        max_rounds: 3
        questions_per_round: 3
    skip_conditions:
        - resume_spec_id_present
        - skip_interview_flag
        - technical_keywords_gte_5
