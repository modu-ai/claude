<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button — Claude Warm Editorial</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://statics.goorm.io" crossorigin="anonymous">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="https://statics.goorm.io/fonts/GoormSansCode/v1.0.1/GoormSansCode.min.css">
<script>
tailwind.config = { theme: { extend: {
  colors: { primary:'#3d7d5f','primary-active':'#265240','primary-disabled':'#e6dfd8', ink:'#060606', body:'#3d3d3a','body-strong':'#252523', muted:'#6c6a64','muted-soft':'#8e8b82', hairline:'#e6dfd8','hairline-soft':'#ebe6df', canvas:'#f4f4f4','surface-soft':'#ececec','surface-card':'#e6e6e6','surface-dark':'#181715','surface-dark-elevated':'#1a1a1a','on-primary':'#ffffff','on-dark':'#f4f4f4','on-dark-soft':'#a09d96','accent-teal':'#5db8a6','accent-amber':'#e8a55a', success:'#5db872', warning:'#d4a017', error:'#c64545' },
  fontFamily: { display:['"Pretendard Variable"','Pretendard','sans-serif'], sans:['"Pretendard Variable"','Pretendard','sans-serif'], mono:['"Goorm Sans Code"','monospace'] },
  borderRadius: { sm:'6px', md:'8px', lg:'12px', xl:'16px', pill:'9999px' },
  spacing: { section:'96px' }
}}}
</script>
</head>
<body class="bg-canvas text-ink font-sans">
<main class="mx-auto max-w-4xl px-6 py-16">
  <header class="mb-12">
    <div class="text-xs font-semibold uppercase tracking-[0.18em] text-primary">Components</div>
    <h1 class="mt-2 font-display text-5xl font-medium tracking-tight text-ink">Button</h1>
    <p class="mt-3 max-w-2xl text-body">코랄 primary는 시그니처 CTA — 개별 요소에는 절제해 사용합니다. md(8px) 반경, height 40, Pretendard 500.</p>
  </header>

  <!-- Light variants -->
  <section class="mb-12 rounded-lg border border-hairline bg-surface-card p-8">
    <div class="mb-5 text-xs font-semibold uppercase tracking-[0.18em] text-muted">크림 캔버스 위</div>
    <div class="flex flex-wrap items-center gap-4">
      <button class="inline-flex h-10 items-center rounded-md bg-primary px-5 text-sm font-medium text-on-primary transition-colors hover:bg-primary-active focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-canvas">시작하기</button>
      <button class="inline-flex h-10 items-center rounded-md border border-hairline bg-canvas px-5 text-sm font-medium text-ink transition-colors hover:bg-surface-soft">자세히 보기</button>
      <button class="inline-flex h-10 items-center rounded-md px-1 text-sm font-medium text-primary underline-offset-4 hover:underline">텍스트 링크 →</button>
      <button disabled class="inline-flex h-10 cursor-not-allowed items-center rounded-md bg-primary-disabled px-5 text-sm font-medium text-muted">비활성</button>
    </div>
    <div class="mt-4 flex flex-wrap gap-6 font-mono text-xs text-muted">
      <span>primary (coral)</span><span>secondary (cream + hairline)</span><span>text-link (coral)</span><span>disabled</span>
    </div>
  </section>

  <!-- On dark -->
  <section class="mb-12 rounded-lg border border-hairline bg-surface-dark p-8">
    <div class="mb-5 text-xs font-semibold uppercase tracking-[0.18em] text-on-dark-soft">다크 서피스 위</div>
    <div class="flex flex-wrap items-center gap-4">
      <button class="inline-flex h-10 items-center rounded-md bg-primary px-5 text-sm font-medium text-on-primary transition-colors hover:bg-primary-active">시작하기</button>
      <button class="inline-flex h-10 items-center rounded-md bg-surface-dark-elevated px-5 text-sm font-medium text-on-dark transition-opacity hover:opacity-90">on-dark secondary</button>
    </div>
    <div class="mt-4 flex flex-wrap gap-6 font-mono text-xs text-on-dark-soft">
      <span>primary (coral)</span><span>secondary (dark-elevated — 절대 라이트로 반전 금지)</span>
    </div>
  </section>

  <!-- Sizes -->
  <section>
    <div class="mb-5 text-xs font-semibold uppercase tracking-[0.18em] text-muted">크기</div>
    <div class="flex flex-wrap items-center gap-4">
      <button class="inline-flex h-8 items-center rounded-md bg-primary px-3 text-xs font-medium text-on-primary hover:bg-primary-active">Small</button>
      <button class="inline-flex h-10 items-center rounded-md bg-primary px-5 text-sm font-medium text-on-primary hover:bg-primary-active">Default</button>
      <button class="inline-flex h-12 items-center rounded-md bg-primary px-7 text-base font-medium text-on-primary hover:bg-primary-active">Large</button>
    </div>
  </section>
</main>
</body>
</html>
