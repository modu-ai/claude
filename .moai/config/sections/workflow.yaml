workflow:
    # Optional default mode for /moai run and /moai design.
    # Values: autopilot | loop | team. Empty/absent = harness-based auto-selection.
    # Precedence: CLI --mode flag > this field > harness auto.
    # @MX:WARN - Default mode field is utility-skill-only consumer. @MX:REASON - Field is read by run skill dispatcher; changing semantics without updating dispatcher breaks behavior contract.
    default_mode: ""
    # agentic_loop: pipeline-level completion-loop iteration ceiling, loaded by
    # internal/config AgenticLoopConfig (types.go) with default from
    # DefaultAgenticLoopMaxIterations (defaults.go); also prose-read by the
    # orchestrator for the moai.md Agentic Completion Loop termination clause.
    # DISTINCT from loop_prevention.max_iterations (per-operation diagnostic
    # fix-loop bound) — separate blocks, separate semantics.
    agentic_loop:
        max_iterations: 10
    auto_clear:
        after_plan: true
        after_run: false
        enabled: true
        token_threshold: 150000
    execution_mode: team
    # Iteration-ceiling precedence: CLI --max flag > ralph.yaml loop.max_iterations
    # > workflow.yaml loop_prevention.max_iterations (this block — the lowest-
    # precedence documented ceiling surface for the diagnostic fix-loop). The
    # memory-safe 50-iteration checkpoint (loop workflow Step 2) is an orthogonal
    # memory-pressure safeguard, not a fourth ceiling.
    loop_prevention:
        failure_pattern_detection: true
        max_iterations: 100
        max_retries_per_operation: 3
    team:
        auto_selection:
            min_complexity_score: 7
            min_domains_for_team: 3
            min_files_for_team: 10
        default_model: sonnet
        delegate_mode: true
        # enabled false (Sonnet 5 / Opus 4.8 re-design). The historical
        # 200K-window baseline-refill breaker is resolved on the current default
        # lineup (Sonnet 5 ships a single 1M variant; no 200K fallback target).
        # team mode is opt-in only (explicit --team); Phase 0.95 defaults to
        # subagent fanout (Mode 4) for multi-domain research/review and sequential
        # sub-agent (Mode 5) for coding. See
        # .claude/rules/moai/workflow/orchestration-mode-selection.md §C.1.
        enabled: false
        max_teammates: 10
        # role_profile_keys: enumeration of allowed role types for the 5+1+1
        # Agent Teams composition documented in
        # .claude/rules/moai/workflow/team-pattern-cookbook.md (6th pattern,
        # the Implementation Team 5+1+1 variant). The full role_profiles map
        # below contains all 7 profile definitions; this list restricts which
        # keys participate in the 5+1+1 spawn pattern (implementer × 5 +
        # tester × 1 + reviewer × 1).
        # Requires: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 in settings.json env.
        role_profile_keys:
            - implementer
            - tester
            - reviewer
        # effort: declarative metadata consumed by orchestrator/workflow-script authors; no Go code reads this field.
        role_profiles:
            researcher:
                mode: plan
                effort: low
                model: haiku
                isolation: none
                description: "Read-only codebase exploration and analysis"
            analyst:
                mode: plan
                effort: medium
                model: sonnet
                isolation: none
                description: "Requirements analysis and validation"
            architect:
                mode: plan
                effort: xhigh
                model: sonnet
                isolation: none
                description: "Solution design and architecture decisions"
            implementer:
                mode: acceptEdits
                effort: xhigh
                model: sonnet
                isolation: worktree
                description: "Code implementation (backend, frontend, full-stack)"
            tester:
                mode: acceptEdits
                effort: medium
                model: sonnet
                isolation: worktree
                description: "Test creation and coverage validation"
            designer:
                mode: acceptEdits
                effort: medium
                model: sonnet
                isolation: worktree
                description: "UI/UX design with MCP design tools"
            reviewer:
                mode: plan
                effort: high
                model: haiku
                isolation: none
                description: "Code review and quality validation"
        patterns:
            design_implementation:
                description: Cross-layer feature implementation with UI/UX design
                model: inherit
                roles:
                    - designer
                    - backend-dev
                    - frontend-dev
                    - tester
            full_stack:
                description: Full-stack implementation with quality gate
                model: inherit
                roles:
                    - api-layer
                    - ui-layer
                    - data-layer
                    - quality
            implementation:
                description: Cross-layer feature implementation
                model: inherit
                roles:
                    - backend-dev
                    - frontend-dev
                    - tester
            investigation:
                description: Competing hypothesis debugging
                model: haiku
                roles:
                    - hypothesis-1
                    - hypothesis-2
                    - hypothesis-3
            plan_research:
                description: Parallel SPEC research and design
                model: inherit
                roles:
                    - researcher
                    - analyst
                    - architect
            review:
                description: Multi-perspective code review
                model: inherit
                roles:
                    - security-reviewer
                    - perf-reviewer
                    - quality-reviewer
                    - ux-reviewer
        require_plan_approval: true
    # Worktree automation settings (per the canonical worktree contract)
    # auto_create: false (aligned with worktree-autonomous user policy).
    # L1 worktree is Claude Code runtime autonomous — MoAI orchestrator does not auto-create it.
    # auto_merge/auto_cleanup only take effect when the user manually creates a worktree.
    worktree:
        auto_create: false
        auto_merge: true
        auto_cleanup: true
        tmux_preferred: true
        session_name_pattern: "moai-{ProjectName}-{SPEC-ID}"
        # Sparse checkout paths for large monorepos (Claude Code v2.1.76+)
        # Uncomment and customize to speed up worktree creation
        # sparse_paths:
        #     - "src/"
        #     - "tests/"
        #     - "config/"
    token_budget:
        plan: 30000
        run: 180000
        sync: 40000
    # workflow_agents: dynamic-workflow purpose taxonomy -> {model, effort}
    # DEFAULTS. This block is the SSOT for workflow agent() model/effort
    # defaults; per-script literals in .claude/workflows/*.js override it.
    # Values are validated against the closed sets: model in
    # {inherit, haiku, sonnet, opus}, effort in {low, medium, high, xhigh, max}.
    workflow_agents:
        read-only-extract: { model: haiku, effort: low }
        mechanical-transform: { model: sonnet, effort: medium }
        synthesize: { model: sonnet, effort: high }
        research: { model: sonnet, effort: high }
        verify-judge: { model: sonnet, effort: xhigh }
        implement: { model: sonnet, effort: xhigh }
        design-architecture: { model: opus, effort: xhigh }
    # model_routing: Tier x Phase -> {model, effort} routing defaults.
    # This block is the SSOT for per-spawn cost routing; the orchestrator
    # consults RouteModelFor(tier, phase) at spawn time and applies the
    # returned {model, effort} as a per-spawn override UNLESS the caller
    # supplied an explicit override (matrix yields to explicit user override).
    # Key format: <TIER>-<phase> where Tier in {S, M, L} and Phase in
    # {plan, run, sync, mx}. Closed sets: model in
    # {inherit, haiku, sonnet, opus, glm}, effort in {low, medium, high, xhigh, max}.
    # An absent (Tier, Phase) pair falls back to a documented default with
    # fallback_applied: true on the returned entry.
    model_routing:
        S-plan: { model: sonnet, effort: medium }
        S-run: { model: sonnet, effort: high }
        S-sync: { model: haiku, effort: low }
        S-mx: { model: haiku, effort: low }
        M-plan: { model: sonnet, effort: medium }
        M-run: { model: sonnet, effort: xhigh }
        M-sync: { model: sonnet, effort: medium }
        M-mx: { model: haiku, effort: low }
        L-plan: { model: opus, effort: high }
        L-run: { model: opus, effort: xhigh }
        L-sync: { model: sonnet, effort: high }
        L-mx: { model: sonnet, effort: medium }
