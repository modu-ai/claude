# Hardcoded-credential detection (CWE-798).
#
# Detects string literals that begin with a well-known credential prefix
# (OpenAI sk-, AWS access-key AKIA, GitHub token ghp_, Slack token xox*-,
# Google API key AIza). The prefix + minimum-length anchoring keeps the match
# precise: a benign string that merely contains these characters mid-value is
# not flagged, and neither is a value loaded from an environment variable or a
# secret manager.
#
# Every language below carries the identical pattern-family with equal
# opportunity. Languages not yet listed are equal-priority future additions.
---
id: sec-hardcoded-credential
language: go
severity: error
message: "A credential appears to be hardcoded in source. Load it from an environment variable or a secret manager instead."
note: "A hardcoded credential leaks through the source repository, its history, and every clone. Read the value from os.Getenv or a secret manager at runtime."
metadata:
  owasp: "A07:2021 - Identification and Authentication Failures"
  cwe: "CWE-798"
rule:
  kind: interpreted_string_literal
  regex: "^\"(sk-|AKIA[0-9A-Z]{16}|ghp_[0-9A-Za-z]{36}|xox[baprs]-|AIza[0-9A-Za-z_-]{35})"
---
id: sec-hardcoded-credential
language: python
severity: error
message: "A credential appears to be hardcoded in source. Load it from an environment variable or a secret manager instead."
note: "A hardcoded credential leaks through the source repository, its history, and every clone. Read the value from os.environ or a secret manager at runtime."
metadata:
  owasp: "A07:2021 - Identification and Authentication Failures"
  cwe: "CWE-798"
rule:
  kind: string
  regex: "^[\"'](sk-|AKIA[0-9A-Z]{16}|ghp_[0-9A-Za-z]{36}|xox[baprs]-|AIza[0-9A-Za-z_-]{35})"
---
