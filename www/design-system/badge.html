<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badge — Claude Warm Editorial</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://statics.goorm.io" crossorigin="anonymous">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="https://statics.goorm.io/fonts/GoormSansCode/v1.0.1/GoormSansCode.min.css">
<script>
tailwind.config = { theme: { extend: {
  colors: { primary:'#3d7d5f','primary-active':'#265240','primary-disabled':'#e6dfd8', ink:'#060606', body:'#3d3d3a','body-strong':'#252523', muted:'#6c6a64','muted-soft':'#8e8b82', hairline:'#e6dfd8','hairline-soft':'#ebe6df', canvas:'#f4f4f4','surface-soft':'#ececec','surface-card':'#e6e6e6','surface-dark':'#181715','surface-dark-elevated':'#1a1a1a','on-primary':'#ffffff','on-dark':'#f4f4f4','on-dark-soft':'#a09d96','accent-teal':'#5db8a6','accent-amber':'#e8a55a', success:'#5db872', warning:'#d4a017', error:'#c64545' },
  fontFamily: { display:['"Pretendard Variable"','Pretendard','sans-serif'], sans:['"Pretendard Variable"','Pretendard','sans-serif'], mono:['"Goorm Sans Code"','monospace'] },
  borderRadius: { sm:'6px', md:'8px', lg:'12px', xl:'16px', pill:'9999px' },
  spacing: { section:'96px' }
}}}
</script>
</head>
<body class="bg-canvas text-ink font-sans">
<main class="mx-auto max-w-3xl px-6 py-16">
  <header class="mb-12">
    <div class="text-xs font-semibold uppercase tracking-[0.18em] text-primary">Components</div>
    <h1 class="mt-2 font-display text-5xl font-medium tracking-tight text-ink">Badge</h1>
    <p class="mt-3 max-w-2xl text-body">크림 pill 배지와 코랄 강조 배지. 시맨틱 배지는 15% 알파 틴트로 부드럽게.</p>
  </header>

  <section class="mb-10 rounded-lg border border-hairline bg-surface-card p-8">
    <div class="mb-5 text-xs font-semibold uppercase tracking-[0.18em] text-muted">기본 / 강조</div>
    <div class="flex flex-wrap items-center gap-3">
      <span class="inline-flex items-center rounded-pill bg-surface-card px-3 py-1 text-xs font-medium text-ink ring-1 ring-hairline">badge-pill</span>
      <span class="inline-flex items-center rounded-pill bg-primary px-3 py-1 text-xs font-semibold uppercase tracking-wider text-on-primary">NEW</span>
      <span class="inline-flex items-center rounded-pill bg-primary px-3 py-1 text-xs font-semibold uppercase tracking-wider text-on-primary">BETA</span>
      <span class="inline-flex items-center rounded-pill border border-hairline px-3 py-1 text-xs font-medium text-muted">v2.24</span>
    </div>
    <div class="mt-4 font-mono text-xs text-muted">badge-pill (surface-card) · badge-coral (uppercase caption)</div>
  </section>

  <section class="mb-10">
    <div class="mb-5 text-xs font-semibold uppercase tracking-[0.18em] text-muted">시맨틱 (15% 틴트)</div>
    <div class="flex flex-wrap items-center gap-3">
      <span class="inline-flex items-center rounded-pill bg-success/15 px-3 py-1 text-xs font-medium text-success">활성</span>
      <span class="inline-flex items-center rounded-pill bg-warning/15 px-3 py-1 text-xs font-medium text-warning">대기</span>
      <span class="inline-flex items-center rounded-pill bg-error/15 px-3 py-1 text-xs font-medium text-error">실패</span>
      <span class="inline-flex items-center rounded-pill bg-accent-teal/15 px-3 py-1 text-xs font-medium text-accent-teal">연결됨</span>
    </div>
  </section>

  <section>
    <div class="mb-5 text-xs font-semibold uppercase tracking-[0.18em] text-muted">인라인 사용</div>
    <p class="max-w-xl text-body">
      Opus 4.8 <span class="inline-flex items-center rounded-pill bg-primary px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wider text-on-primary align-middle">NEW</span>
      모델은 1M 컨텍스트를 지원합니다 <span class="inline-flex items-center rounded-pill bg-success/15 px-2 py-0.5 text-[10px] font-medium text-success align-middle">GA</span>.
    </p>
  </section>
</main>
</body>
</html>
