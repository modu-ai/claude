<!-- @dsCard group="Patterns" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stat Tile — Claude Warm Editorial</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://statics.goorm.io" crossorigin="anonymous">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="https://statics.goorm.io/fonts/GoormSansCode/v1.0.1/GoormSansCode.min.css">
<script>
tailwind.config = { theme: { extend: {
  colors: { primary:'#3d7d5f','primary-active':'#265240','primary-disabled':'#e6dfd8', ink:'#060606', body:'#3d3d3a','body-strong':'#252523', muted:'#6c6a64','muted-soft':'#8e8b82', hairline:'#e6dfd8','hairline-soft':'#ebe6df', canvas:'#f4f4f4','surface-soft':'#ececec','surface-card':'#e6e6e6','surface-dark':'#181715','surface-dark-elevated':'#1a1a1a','on-primary':'#ffffff','on-dark':'#f4f4f4','on-dark-soft':'#a09d96','accent-teal':'#5db8a6','accent-amber':'#e8a55a', success:'#5db872', warning:'#d4a017', error:'#c64545' },
  fontFamily: { display:['"Pretendard Variable"','Pretendard','sans-serif'], sans:['"Pretendard Variable"','Pretendard','sans-serif'], mono:['"Goorm Sans Code"','monospace'] },
  borderRadius: { sm:'6px', md:'8px', lg:'12px', xl:'16px', pill:'9999px' },
  spacing: { section:'96px' }
}}}
</script>
</head>
<body class="bg-canvas text-ink font-sans">
<main class="mx-auto max-w-5xl px-6 py-16">
  <header class="mb-12">
    <div class="text-xs font-semibold uppercase tracking-[0.18em] text-primary">Patterns</div>
    <h1 class="mt-2 font-display text-5xl font-medium tracking-tight text-ink">Stat Tile</h1>
    <p class="mt-3 max-w-2xl text-body">mono 대문자 라벨, 큰 세리프 숫자, success delta pill. 크림과 다크 두 버전.</p>
  </header>

  <!-- Cream tiles -->
  <section class="mb-12">
    <div class="mb-5 text-xs font-semibold uppercase tracking-[0.18em] text-muted">크림 캔버스</div>
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
      <div class="rounded-lg border border-hairline bg-surface-card p-6">
        <div class="font-mono text-xs uppercase tracking-[0.14em] text-muted">월 활성 사용자</div>
        <div class="mt-2 font-display text-5xl font-medium tracking-tight text-ink">128K</div>
        <span class="mt-3 inline-flex items-center rounded-pill bg-success/15 px-2.5 py-1 text-xs font-medium text-success">▲ 12.4%</span>
      </div>
      <div class="rounded-lg border border-hairline bg-surface-card p-6">
        <div class="font-mono text-xs uppercase tracking-[0.14em] text-muted">평균 응답</div>
        <div class="mt-2 font-display text-5xl font-medium tracking-tight text-ink">142<span class="text-2xl text-muted">ms</span></div>
        <span class="mt-3 inline-flex items-center rounded-pill bg-success/15 px-2.5 py-1 text-xs font-medium text-success">▼ 8.0%</span>
      </div>
      <div class="rounded-lg border border-hairline bg-surface-card p-6">
        <div class="font-mono text-xs uppercase tracking-[0.14em] text-muted">에러율</div>
        <div class="mt-2 font-display text-5xl font-medium tracking-tight text-ink">0.4<span class="text-2xl text-muted">%</span></div>
        <span class="mt-3 inline-flex items-center rounded-pill bg-warning/15 px-2.5 py-1 text-xs font-medium text-warning">▲ 0.1%</span>
      </div>
      <div class="rounded-lg border border-hairline bg-surface-card p-6">
        <div class="font-mono text-xs uppercase tracking-[0.14em] text-muted">가동률</div>
        <div class="mt-2 font-display text-5xl font-medium tracking-tight text-ink">99.98<span class="text-2xl text-muted">%</span></div>
        <span class="mt-3 inline-flex items-center rounded-pill bg-success/15 px-2.5 py-1 text-xs font-medium text-success">▲ 안정</span>
      </div>
    </div>
  </section>

  <!-- Dark tiles -->
  <section>
    <div class="mb-5 text-xs font-semibold uppercase tracking-[0.18em] text-muted">다크 서피스</div>
    <div class="grid gap-px overflow-hidden rounded-lg border border-surface-dark-elevated bg-surface-dark-elevated sm:grid-cols-3">
      <div class="bg-surface-dark p-6">
        <div class="font-mono text-xs uppercase tracking-[0.14em] text-on-dark-soft">총 토큰 처리</div>
        <div class="mt-2 font-display text-5xl font-medium tracking-tight text-on-dark">2.4B</div>
        <span class="mt-3 inline-flex items-center rounded-pill bg-success/20 px-2.5 py-1 text-xs font-medium text-success">▲ 21%</span>
      </div>
      <div class="bg-surface-dark p-6">
        <div class="font-mono text-xs uppercase tracking-[0.14em] text-on-dark-soft">스킬 호출</div>
        <div class="mt-2 font-display text-5xl font-medium tracking-tight text-on-dark">540K</div>
        <span class="mt-3 inline-flex items-center rounded-pill bg-success/20 px-2.5 py-1 text-xs font-medium text-success">▲ 15%</span>
      </div>
      <div class="bg-surface-dark p-6">
        <div class="font-mono text-xs uppercase tracking-[0.14em] text-on-dark-soft">비용 절감</div>
        <div class="mt-2 font-display text-5xl font-medium tracking-tight text-on-dark">67<span class="text-2xl text-on-dark-soft">%</span></div>
        <span class="mt-3 inline-flex items-center rounded-pill bg-accent-teal/20 px-2.5 py-1 text-xs font-medium text-accent-teal">CG 모드</span>
      </div>
    </div>
  </section>
  <p class="mt-6 font-mono text-xs text-muted">mono uppercase label · serif/sans 숫자 · success delta pill</p>
</main>
</body>
</html>
